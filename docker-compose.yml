services:
  postgres:
    image: postgres:16-alpine
    container_name: switchboard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: switchboard
    ports:
      - "5432:5432"
    volumes:
      - switchboard-postgres:/var/lib/postgresql/data

volumes:
  switchboard-postgres:
